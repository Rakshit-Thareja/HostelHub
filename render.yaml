services:
  - type: web
    name: hostelhub-fullstack
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    disks:
      - name: hostelhub-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: DB_PATH
        value: /var/data/hostelhub.db
